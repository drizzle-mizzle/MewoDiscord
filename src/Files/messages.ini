# Голосовые каналы — подключение
VoiceConversationStarted: 📳 Начался разговор в {channel}
VoiceConversationEnded: 📴 Закончился разговор в {channel} | Длительность: **{timer}**
VoiceUserJoined: {user} присоединился к {channel} | Длительность: **{timer}**
VoiceUserLeft: {user} покинул {channel} | Длительность: **{timer}**

# Голосовые каналы — микрофон (self)
VoiceUserMuted: 🔇 {user} отключил себе микрофон в {channel} | Длительность: **{timer}**
VoiceUserUnmuted: 🔊 {user} включил себе микрофон в {channel} | Длительность: **{timer}**

# Голосовые каналы — микрофон (сервер)
VoiceUserServerMuted: 🔇 {user} был заглушен в {channel} | Длительность: **{timer}**
VoiceUserServerUnmuted: 🔊 {user} был разглушен в {channel} | Длительность: **{timer}**

# Голосовые каналы — звук (self)
VoiceUserDeafened: 🔇 {user} отключил себе звук в {channel} | Длительность: **{timer}**
VoiceUserUndeafened: 🔊 {user} включил себе звук в {channel} | Длительность: **{timer}**

# Голосовые каналы — звук (сервер)
VoiceUserServerDeafened: 🔇 {user} был полностью заглушен в {channel} | Длительность: **{timer}**
VoiceUserServerUndeafened: 🔊 {user} был полностью разглушен в {channel} | Длительность: **{timer}**

# Голосовые каналы — стрим
VoiceUserStartedStream: 📺 {user} начал стрим в {channel} | Длительность: **{timer}**
VoiceUserStoppedStream: 📺 {user} завершил стрим в {channel} | Длительность: **{timer}**

# Команда /purge
PurgeDone: 🗑️ Удалено сообщений: **{count}**
PurgeTooOld: ⚠️ Пропущено сообщений старше 14 дней: **{count}**
PurgeNoPermission: ❌ У тебя нет прав на управление сообщениями
PurgeNotTextChannel: ❌ Эта команда работает только в текстовых каналах
